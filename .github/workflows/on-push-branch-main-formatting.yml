name: Main-Formatting

on:
  push:
    branches: [main]

jobs:
  ruff:
    name: "ruff lint & format"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: Install dependencies
        run: uv sync --extra dev
      - uses: pre-commit/action@v3.0.0
